[build]
  command = "npm install && npm run build"
  publish = "dist"
  functions = "netlify/functions"

[[redirects]]
  from = "/api/claude"
  to = "/.netlify/functions/claude-proxy"
  status = 200

[[redirects]]
  from = "/api/prices"
  to = "/.netlify/functions/prices-proxy"
  status = 200

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
